<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Marseille — tes lieux</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --ink:#14303F;
    --paper:#F6F4EE;
    --line:#DCD7CB;
    --route:#0E7C86;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--paper);color:var(--ink);
    display:flex;flex-direction:column;height:100dvh;overflow:hidden;
  }
  header{
    padding:10px 14px 8px;
    border-bottom:1px solid var(--line);
    flex:0 0 auto;background:var(--paper);z-index:1000;
  }
  .title-row{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  h1{
    font-size:15px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
    display:flex;align-items:baseline;gap:8px;min-width:0;
  }
  h1 .count{font-weight:500;font-size:12px;letter-spacing:0;text-transform:none;color:#6b7a83}
  .bike-btn{
    flex:0 0 auto;
    font-size:12px;font-weight:700;line-height:1;
    padding:7px 10px;border-radius:3px;
    border:1px solid var(--ink);background:var(--ink);color:#fff;
    cursor:pointer;user-select:none;white-space:nowrap;
  }
  .bike-btn:active{transform:scale(.97)}
  .bike-btn.on{background:#fff;color:var(--ink)}
  .bike-btn:disabled{opacity:.55;cursor:wait}
  .bike-btn:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .route-bar{
    display:none;align-items:center;justify-content:space-between;gap:10px;
    margin-top:8px;padding:8px 10px;border:1px solid var(--line);
    background:#fff;border-radius:3px;font-size:12.5px;line-height:1.35;
  }
  .route-bar.show{display:flex}
  .route-bar .meta{min-width:0}
  .route-bar .meta strong{font-weight:800}
  .route-bar .meta .sub{color:#3c4f5a;margin-top:2px}
  .route-bar .actions{display:flex;gap:6px;flex:0 0 auto}
  .route-bar button{
    font:inherit;font-size:12px;font-weight:700;line-height:1;
    padding:7px 9px;border-radius:3px;border:1px solid var(--line);
    background:var(--paper);color:var(--ink);cursor:pointer;
  }
  .route-bar button.primary{
    border-color:var(--ink);background:var(--ink);color:#fff;
  }
  .filter-label{
    font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:#6b7a83;margin:8px 0 0;
  }
  .chips{
    display:flex;gap:6px;overflow-x:auto;padding:6px 0 2px;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;
    font-size:12.5px;font-weight:600;line-height:1;
    padding:7px 11px;border-radius:3px;
    border:1px solid var(--line);background:#fff;color:var(--ink);
    cursor:pointer;user-select:none;transition:opacity .12s, transform .05s;
  }
  .chip:active{transform:scale(.97)}
  .chip .flag{width:9px;height:9px;border-radius:2px;background:var(--fc,#888)}
  .chip.off{opacity:.38}
  .chip.all{border-color:var(--ink)}
  .chip:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  #map{flex:1 1 auto;min-height:0;position:relative}
  .leaflet-container{background:#DDE6E4;font:inherit}
  .leaflet-container.picking{cursor:crosshair}
  #basemap-note{
    position:absolute;left:50%;bottom:18px;transform:translateX(-50%);
    z-index:1001;background:var(--ink);color:#fff;
    font-size:12px;line-height:1.4;padding:9px 13px;border-radius:4px;
    max-width:88%;text-align:center;display:none;
  }
  .leaflet-popup-content-wrapper{
    border-radius:4px;box-shadow:0 4px 18px rgba(20,48,63,.18);
  }
  .leaflet-popup-content{margin:12px 14px;line-height:1.4}
  .pop .cat{
    display:inline-flex;align-items:center;gap:5px;
    font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:#6b7a83;margin-bottom:4px;
  }
  .pop .cat .flag{width:8px;height:8px;border-radius:2px}
  .pop .name{font-size:14.5px;font-weight:800;margin-bottom:3px}
  .pop .note{font-size:12.5px;color:#3c4f5a}
  .mk-label{
    background:transparent;border:none;box-shadow:none;
    font-size:11px;font-weight:700;color:var(--ink);
    text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff;
    padding:0;
  }
  .mk-label::before{display:none}
  .lowzoom .mk-label{display:none}
  .pick-label{
    background:var(--ink);color:#fff;border:none;border-radius:3px;
    font-size:11px;font-weight:700;padding:3px 6px;box-shadow:none;
  }
  .pick-label::before{display:none}
  @media (prefers-reduced-motion: reduce){
    .chip,.bike-btn{transition:none}
  }
</style>
</head>
<body>
<header>
  <div class="title-row">
    <h1>Marseille, tes lieux <span class="count" id="count"></span></h1>
    <button type="button" class="bike-btn" id="bikeBtn" aria-pressed="false">Itinéraire vélo</button>
  </div>
  <div class="route-bar" id="routeBar" role="status">
    <div class="meta" id="routeMeta"></div>
    <div class="actions">
      <button type="button" id="gpsBtn" class="primary">Ma position</button>
      <button type="button" id="clearRouteBtn">Effacer</button>
    </div>
  </div>
  <div class="filter-label">Catégories</div>
  <div class="chips" id="chips" role="group" aria-label="Filtrer par catégorie"></div>
  <div class="filter-label">Arrondissements</div>
  <div class="chips" id="arrChips" role="group" aria-label="Filtrer par arrondissement"></div>
</header>
<div id="map"></div>
<div id="basemap-note">Fond de carte indisponible dans cet aperçu.<br>Télécharge le fichier et ouvre-le dans un navigateur pour l'afficher.</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  {n:"La Cité de l'Agriculture", c:"alim", a:1, lat:43.2995428, lng:5.3858187, note:"Agriculture urbaine et alimentation durable, avec cantine locale. Ton fil Capitulaire 2050. 6 sq. Stalingrad, 1er."},

  {n:"Royal Boxing Club", c:"sport", a:8, lat:43.2767084, lng:5.3826481, note:"Encadrement exigeant, sparring dédié, bien équipé. Rue du Commandant Rolland, 8e."},

  {n:"Piscine Bonneveine", c:"sport", a:8, lat:43.2482527, lng:5.392773, note:"Municipale du 8e, vieillissante mais accueil sympa, pratique côté sud."},
  {n:"Piscine Pointe Rouge", c:"sport", a:8, lat:43.2417337, lng:5.3636549, note:"Municipale face au port de la Pointe Rouge, propre et bien surveillée."}

const OSRM = 'https://router.project-osrm.org/route/v1/cycling';

function arrLabel(a){
  return a === 1 ? '1er' : a + 'e';
}

function formatMins(mins){
  if(mins < 60) return mins + ' min';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m ? h + ' h ' + String(m).padStart(2, '0') : h + ' h';
}

function formatKm(km){
  return (Math.round(km * 10) / 10).toString().replace('.', ',') + ' km';
}

function popupHtml(p){
  const color = CATS[p.c].color;
  return `<div class="pop">
      <div class="cat"><span class="flag" style="background:${color}"></span>${CATS[p.c].label} · ${arrLabel(p.a)}</div>
      <div class="name">${p.n}</div>
      <div class="note">${p.note}</div>
    </div>`;
}

const map = L.map('map', {zoomControl:true, attributionControl:true});
map.attributionControl.setPrefix(false);

const PROVIDERS = [
  {url:'https://tile.openstreetmap.org/{z}/{x}/{y}.png', attr:'© OpenStreetMap'},
  {url:'https://maps.wikimedia.org/osm-intl/{z}/{x}/{y}.png', attr:'© OpenStreetMap · Wikimedia'},
  {url:'https://basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', attr:'© OpenStreetMap · CARTO'},
  {url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', attr:'© Esri'}
];
let tileTimer = null, tilesOk = false;

function tryProvider(i){
  if(i >= PROVIDERS.length){
    document.getElementById('basemap-note').style.display = 'block';
    return;
  }
  const p = PROVIDERS[i];
  const layer = L.tileLayer(p.url, {maxZoom:19, attribution:p.attr});
  let failed = false;
  layer.once('tileload', () => {
    tilesOk = true;
    clearTimeout(tileTimer);
    document.getElementById('basemap-note').style.display = 'none';
  });
  layer.on('tileerror', () => {
    if(tilesOk || failed) return;
    failed = true;
    clearTimeout(tileTimer);
    map.removeLayer(layer);
    tryProvider(i + 1);
  });
  tileTimer = setTimeout(() => {
    if(!tilesOk && !failed){
      failed = true;
      map.removeLayer(layer);
      tryProvider(i + 1);
    }
  }, 3000);
  layer.addTo(map);
}
tryProvider(0);

const ARRONDissements = [...new Set(PLACES.map(p => p.a))].sort((a, b) => a - b);
const activeCats = new Set(Object.keys(CATS));
const activeArrs = new Set(ARRONDissements);
const markers = [];

let routeMode = false;
let picks = []; // [{lat,lng,label,marker?}]
let pickMarkers = [];
let routeLine = null;
let routeReq = 0;

const bikeBtn = document.getElementById('bikeBtn');
const routeBar = document.getElementById('routeBar');
const routeMeta = document.getElementById('routeMeta');
const clearRouteBtn = document.getElementById('clearRouteBtn');
const gpsBtn = document.getElementById('gpsBtn');

PLACES.forEach(p => {
  const color = CATS[p.c].color;
  const m = L.circleMarker([p.lat, p.lng], {
    radius:8, color:'#fff', weight:2, fillColor:color, fillOpacity:.95
  });
  m.bindPopup(popupHtml(p));
  m.bindTooltip(p.n, {permanent:true, direction:'right', offset:[9,0], className:'mk-label'});
  m._place = p;
  m.on('click', e => {
    if(!routeMode) return;
    L.DomEvent.stopPropagation(e);
    m.closePopup();
    addPick({lat:p.lat, lng:p.lng, label:p.n});
  });
  m.addTo(map);
  markers.push(m);
});

function updateLabels(){
  document.getElementById('map').classList.toggle('lowzoom', map.getZoom() < 13);
}
map.on('zoomend', updateLabels);

function isVisible(p){
  return activeCats.has(p.c) && activeArrs.has(p.a);
}

function refresh(fit = true){
  markers.forEach(m => {
    const show = isVisible(m._place);
    if(show && !map.hasLayer(m)) m.addTo(map);
    if(!show && map.hasLayer(m)) map.removeLayer(m);
  });
  const visible = markers.filter(m => isVisible(m._place));
  document.getElementById('count').textContent = visible.length + ' lieux';
  if(fit && visible.length && !routeLine){
    map.fitBounds(L.featureGroup(visible).getBounds().pad(0.12));
  }
  document.querySelectorAll('.chip[data-cat]').forEach(ch => {
    ch.classList.toggle('off', !activeCats.has(ch.dataset.cat));
    ch.setAttribute('aria-pressed', activeCats.has(ch.dataset.cat));
  });
  document.querySelectorAll('.chip[data-arr]').forEach(ch => {
    const a = Number(ch.dataset.arr);
    ch.classList.toggle('off', !activeArrs.has(a));
    ch.setAttribute('aria-pressed', activeArrs.has(a));
  });
}

function toggleSet(set, key, allKeys){
  if(set.size === 1 && set.has(key)){
    allKeys.forEach(k => set.add(k));
  } else if(set.size === allKeys.length){
    set.clear(); set.add(key);
  } else {
    set.has(key) ? set.delete(key) : set.add(key);
    if(set.size === 0) allKeys.forEach(k => set.add(k));
  }
}

const chips = document.getElementById('chips');
const allChip = document.createElement('button');
allChip.className = 'chip all';
allChip.textContent = 'Tout';
allChip.onclick = () => {
  Object.keys(CATS).forEach(k => activeCats.add(k));
  refresh();
};
chips.appendChild(allChip);

Object.entries(CATS).forEach(([key, cat]) => {
  const b = document.createElement('button');
  b.className = 'chip';
  b.dataset.cat = key;
  b.setAttribute('aria-pressed','true');
  b.innerHTML = `<span class="flag" style="--fc:${cat.color};background:${cat.color}"></span>${cat.label}`;
  b.onclick = () => {
    toggleSet(activeCats, key, Object.keys(CATS));
    refresh();
  };
  chips.appendChild(b);
});

const arrChips = document.getElementById('arrChips');
const allArrChip = document.createElement('button');
allArrChip.className = 'chip all';
allArrChip.textContent = 'Tous';
allArrChip.onclick = () => {
  ARRONDissements.forEach(a => activeArrs.add(a));
  refresh();
};
arrChips.appendChild(allArrChip);

ARRONDissements.forEach(a => {
  const b = document.createElement('button');
  b.className = 'chip';
  b.dataset.arr = String(a);
  b.setAttribute('aria-pressed','true');
  b.textContent = arrLabel(a);
  b.onclick = () => {
    toggleSet(activeArrs, a, ARRONDissements);
    refresh();
  };
  arrChips.appendChild(b);
});

function setRouteMeta(html){
  routeMeta.innerHTML = html;
}

function clearPicksVisual(){
  pickMarkers.forEach(m => map.removeLayer(m));
  pickMarkers = [];
  if(routeLine){
    map.removeLayer(routeLine);
    routeLine = null;
  }
}

function clearRoute(){
  picks = [];
  clearPicksVisual();
  if(routeMode){
    setRouteMeta('<strong>Clique 2 points</strong><div class="sub">Lieu ou n’importe où sur la carte</div>');
  } else {
    setRouteMeta('');
  }
}

function drawPickMarkers(){
  pickMarkers.forEach(m => map.removeLayer(m));
  pickMarkers = picks.map((p, i) => {
    const m = L.circleMarker([p.lat, p.lng], {
      radius:10, color:'#fff', weight:3, fillColor:'#14303F', fillOpacity:1
    });
    m.bindTooltip(i === 0 ? 'A' : 'B', {
      permanent:true, direction:'top', offset:[0,-12], className:'pick-label'
    });
    m.addTo(map);
    return m;
  });
}

async function fetchBikeRoute(a, b){
  const url = `${OSRM}/${a.lng},${a.lat};${b.lng},${b.lat}?overview=full&geometries=geojson`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if(data.code !== 'Ok' || !data.routes?.length) throw new Error(data.code || 'no route');
  const r = data.routes[0];
  return {
    mins: Math.max(1, Math.round(r.duration / 60)),
    km: r.distance / 1000,
    coords: r.geometry.coordinates.map(([lng, lat]) => [lat, lng])
  };
}

async function maybeRoute(){
  if(picks.length < 2) return;
  const a = picks[0], b = picks[1];
  const req = ++routeReq;
  setRouteMeta(`<strong>${a.label} → ${b.label}</strong><div class="sub">Calcul du trajet vélo…</div>`);
  try{
    const route = await fetchBikeRoute(a, b);
    if(req !== routeReq) return;
    if(routeLine) map.removeLayer(routeLine);
    routeLine = L.polyline(route.coords, {
      color:'#0E7C86', weight:5, opacity:.9, lineJoin:'round', lineCap:'round'
    }).addTo(map);
    map.fitBounds(routeLine.getBounds().pad(0.15));
    setRouteMeta(
      `<strong>${formatMins(route.mins)} à vélo · ${formatKm(route.km)}</strong>` +
      `<div class="sub">${a.label} → ${b.label}</div>`
    );
  } catch(err){
    if(req !== routeReq) return;
    setRouteMeta(
      `<strong>Trajet introuvable</strong>` +
      `<div class="sub">${a.label} → ${b.label} — réessaie avec d’autres points</div>`
    );
  }
}

function addPick(point){
  if(!routeMode) return;
  // Nouveau trajet si on a déjà A+B
  if(picks.length >= 2){
    picks = [];
    clearPicksVisual();
  }
  picks.push(point);
  drawPickMarkers();
  if(picks.length === 1){
    setRouteMeta(`<strong>Départ : ${point.label}</strong><div class="sub">Clique l’arrivée</div>`);
  } else {
    maybeRoute();
  }
}

function setRouteMode(on){
  routeMode = on;
  bikeBtn.classList.toggle('on', on);
  bikeBtn.setAttribute('aria-pressed', String(on));
  bikeBtn.textContent = on ? 'Quitter l’itinéraire' : 'Itinéraire vélo';
  routeBar.classList.toggle('show', on);
  map.getContainer().classList.toggle('picking', on);
  if(on){
    clearRoute();
  } else {
    clearRoute();
    routeBar.classList.remove('show');
  }
}

bikeBtn.onclick = () => setRouteMode(!routeMode);

clearRouteBtn.onclick = () => clearRoute();

gpsBtn.onclick = () => {
  if(!navigator.geolocation){
    setRouteMeta('<strong>GPS indisponible</strong><div class="sub">Clique plutôt un point sur la carte</div>');
    return;
  }
  gpsBtn.disabled = true;
  setRouteMeta('<strong>Localisation…</strong><div class="sub">Autorise l’accès à ta position</div>');
  navigator.geolocation.getCurrentPosition(
    pos => {
      gpsBtn.disabled = false;
      // Remplace le départ s’il existe déjà, sinon ajoute
      if(picks.length === 1){
        picks = [];
        clearPicksVisual();
      } else if(picks.length >= 2){
        picks = [];
        clearPicksVisual();
      }
      addPick({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        label: 'Ma position'
      });
    },
    () => {
      gpsBtn.disabled = false;
      setRouteMeta('<strong>Position refusée</strong><div class="sub">Clique deux points sur la carte</div>');
    },
    {enableHighAccuracy:true, timeout:10000, maximumAge:60000}
  );
};

map.on('click', e => {
  if(!routeMode) return;
  const {lat, lng} = e.latlng;
  addPick({
    lat, lng,
    label: lat.toFixed(4) + ', ' + lng.toFixed(4)
  });
});

refresh();
updateLabels();
</script>
</body>
</html>
