<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F6F4EE">
<title>Marseille — tes lieux</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --ink:#14303F;
    --paper:#F6F4EE;
    --line:#DCD7CB;
    --route:#0E7C86;
    --safe-t:env(safe-area-inset-top,0px);
    --safe-r:env(safe-area-inset-right,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
    --safe-l:env(safe-area-inset-left,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;touch-action:manipulation}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--paper);color:var(--ink);
    height:100dvh;overflow:hidden;position:relative;
  }
  #map{position:absolute;inset:0}
  .leaflet-container{background:#DDE6E4;font:inherit;height:100%}
  .leaflet-container.picking{cursor:crosshair}
  .leaflet-control-zoom{margin-top:calc(12px + var(--safe-t)) !important;margin-left:calc(10px + var(--safe-l)) !important}
  .leaflet-control-attribution{
    max-width:42vw;font-size:9px !important;line-height:1.2;
    margin:0 !important;padding:2px 5px !important;
  }
  .overlay{position:absolute;z-index:1000;pointer-events:none}
  .overlay > *{pointer-events:auto}

  .filters{
    top:calc(12px + var(--safe-t));
    right:calc(12px + var(--safe-r));
    left:auto;
    display:flex;flex-direction:column;align-items:flex-end;gap:8px;
    max-width:min(70vw,260px);
  }
  .bike-btn{
    min-height:40px;
    font-size:12px;font-weight:700;line-height:1;
    padding:10px 12px;border-radius:3px;
    border:1px solid var(--ink);background:var(--ink);color:#fff;
    cursor:pointer;user-select:none;white-space:nowrap;
    box-shadow:0 2px 10px rgba(20,48,63,.12);
  }
  .bike-btn:active{transform:scale(.97)}
  .bike-btn.on{background:rgba(246,244,238,.96);color:var(--ink)}
  .bike-btn:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .bike-btn .long{display:inline}.bike-btn .short{display:none}

  .chips{
    display:flex;flex-direction:column;align-items:stretch;gap:5px;
    overflow-y:auto;padding:8px;
    max-height:min(58dvh,480px);
    -webkit-overflow-scrolling:touch;scrollbar-width:thin;
    background:rgba(246,244,238,.94);border:1px solid var(--line);
    border-radius:3px;backdrop-filter:blur(6px);
    box-shadow:0 2px 14px rgba(20,48,63,.1);
  }
  .chip{
    display:inline-flex;align-items:center;gap:6px;
    min-height:36px;
    font-size:12.5px;font-weight:600;line-height:1.15;
    padding:8px 10px;border-radius:3px;
    border:1px solid var(--line);background:#fff;color:var(--ink);
    cursor:pointer;user-select:none;text-align:left;
  }
  .chip:active{transform:scale(.97)}
  .chip .flag{width:9px;height:9px;border-radius:2px;background:var(--fc,#888);flex:0 0 auto}
  .chip .full{display:inline}.chip .short{display:none}
  .chip.off{opacity:.38}
  .chip.all{border-color:var(--ink)}
  .chip:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

  .route-bar{
    bottom:calc(14px + var(--safe-b));
    left:calc(12px + var(--safe-l));
    right:auto;
    display:none;flex-direction:column;gap:8px;
    width:min(calc(100vw - 24px - var(--safe-l) - var(--safe-r)),320px);
    padding:11px 12px;border:1px solid var(--line);
    background:rgba(246,244,238,.96);border-radius:3px;
    font-size:13px;line-height:1.35;
    backdrop-filter:blur(6px);
    box-shadow:0 2px 14px rgba(20,48,63,.12);
  }
  .route-bar.show{display:flex}
  .route-bar .meta strong{font-weight:800}
  .route-bar .meta .sub{color:#3c4f5a;margin-top:2px;font-size:12px}
  .route-bar .actions{display:flex;gap:6px}
  .route-bar button{
    font:inherit;font-size:12px;font-weight:700;line-height:1;
    min-height:36px;padding:8px 12px;border-radius:3px;
    border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;
  }

  #basemap-note{
    position:absolute;left:50%;bottom:calc(18px + var(--safe-b));transform:translateX(-50%);
    z-index:1001;background:var(--ink);color:#fff;
    font-size:12px;line-height:1.4;padding:9px 13px;border-radius:4px;
    max-width:88%;text-align:center;display:none;pointer-events:none;
  }

  .leaflet-popup-content-wrapper{
    border-radius:4px;box-shadow:0 4px 18px rgba(20,48,63,.18);
  }
  .leaflet-popup-content{margin:12px 14px;line-height:1.4;max-width:min(72vw,260px)}
  .pop .cat{
    display:inline-flex;align-items:center;gap:5px;
    font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:#6b7a83;margin-bottom:4px;
  }
  .pop .cat .flag{width:8px;height:8px;border-radius:2px}
  .pop .name{font-size:14.5px;font-weight:800;margin-bottom:3px}
  .pop .note{font-size:12.5px;color:#3c4f5a}

  .mk-label{
    background:transparent;border:none;box-shadow:none;
    font-size:11px;font-weight:700;color:var(--ink);
    text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff;
    padding:0;
  }
  .mk-label::before{display:none}
  .lowzoom .mk-label{display:none}

  .pick-label{
    background:var(--ink);color:#fff;border:none;border-radius:3px;
    font-size:11px;font-weight:700;padding:3px 6px;box-shadow:none;
  }
  .pick-label::before{display:none}

  .arr-label{
    background:transparent;border:none;box-shadow:none;
    color:var(--ink);font-size:12px;font-weight:800;letter-spacing:.04em;
    text-shadow:-1px -1px 0 rgba(246,244,238,.95),1px -1px 0 rgba(246,244,238,.95),
      -1px 1px 0 rgba(246,244,238,.95),1px 1px 0 rgba(246,244,238,.95);
    padding:0;white-space:nowrap;
  }
  .arr-label::before{display:none}
  .hide-arr .arr-label{display:none}

  .arr-tip{
    background:rgba(20,48,63,.9);color:#fff;border:none;border-radius:3px;
    font-size:11px;font-weight:700;padding:4px 7px;box-shadow:none;
  }
  .arr-tip::before{display:none}

  @media (max-width:720px){
    .filters{
      top:calc(12px + var(--safe-t));
      left:calc(10px + var(--safe-l));
      right:calc(10px + var(--safe-r));
      max-width:none;
      align-items:stretch;
    }
    .filters-head{
      display:flex;justify-content:flex-end;
    }
    .bike-btn{min-height:38px;padding:9px 11px}
    .bike-btn .long{display:none}.bike-btn .short{display:inline}
    .chips{
      flex-direction:row;align-items:center;
      overflow-x:auto;overflow-y:hidden;
      max-height:none;width:100%;
      padding:6px;gap:6px;
      scrollbar-width:none;
    }
    .chips::-webkit-scrollbar{display:none}
    .chip{
      flex:0 0 auto;white-space:nowrap;
      min-height:38px;padding:8px 11px;
    }
    .chip .full{display:none}.chip .short{display:inline}
    .route-bar{
      left:calc(10px + var(--safe-l));
      right:calc(10px + var(--safe-r));
      width:auto;
      bottom:calc(12px + var(--safe-b));
    }
    .leaflet-control-zoom{display:none}
    .leaflet-control-attribution{max-width:55vw}
  }

  @media (prefers-reduced-motion: reduce){
    .chip,.bike-btn{transition:none}
  }
</style>
</head>
<body>
<div id="map"></div>
<div class="overlay filters">
  <div class="filters-head">
    <button type="button" class="bike-btn" id="bikeBtn" aria-pressed="false">
      <span class="long">Itinéraire vélo</span><span class="short">Vélo</span>
    </button>
  </div>
  <div class="chips" id="chips" role="group" aria-label="Filtrer par catégorie"></div>
</div>
<div class="overlay route-bar" id="routeBar" role="status">
  <div class="meta" id="routeMeta"></div>
  <div class="actions">
    <button type="button" id="clearRouteBtn">Effacer</button>
  </div>
</div>
<div id="basemap-note">Fond de carte indisponible dans cet aperçu.<br>Télécharge le fichier et ouvre-le dans un navigateur pour l'afficher.</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const CATS = {
  ateliers:  {label:"Ateliers & fablabs", short:"Ateliers", color:"#B33A1E"},
  ceramique: {label:"Céramique",          short:"Céramique", color:"#C4863B"},
  cinema:    {label:"Ciné art & essai",   short:"Ciné", color:"#5B3E96"},
  culture:   {label:"Culture & idées",    short:"Culture", color:"#1F6FB2"},
  alim:      {label:"Alimentation",       short:"Alim", color:"#3E7C3A"},
  mer:       {label:"Mer & voile",        short:"Mer", color:"#0E7C86"},
  sport:     {label:"Sport",              short:"Sport", color:"#C1355F"}
};

const PLACES = [
  {n:"ICI Marseille", c:"ateliers", a:15, lat:43.3264122, lng:5.3658537, note:"3 500 m² d'ateliers partagés : métal, bois, robotique. Le candidat n°1 pour ton adhésion. 77 rue de Lyon, 15e."},
  {n:"Make it Marseille", c:"ateliers", a:6, lat:43.2860794, lng:5.3769173, note:"Makerspace 24/7 : laser, CNC, plotter de découpe, impression 3D. 108 rue Breteuil, 6e."},
  {n:"FabLab Centrale Marseille", c:"ateliers", a:13, lat:43.3411193, lng:5.4381978, note:"OpenLabs mercredi et jeudi après-midi, ambiance étudiante, électronique. Château-Gombert, 13e."},
  {n:"La Fabulerie", c:"ateliers", a:1, lat:43.2969701, lng:5.3809283, note:"Tiers-lieu design et médiation numérique, café sympa pour bosser. 10 bd Garibaldi, 1er."},
  {n:"Coutellerie du Panier", c:"ateliers", a:2, lat:43.2994168, lng:5.3681319, note:"Stages de fabrication de couteau, du dessin à la trempe. 22 rue du Panier, 2e."},
  {n:"Clay Atelier", c:"ceramique", a:2, lat:43.2974179, lng:5.372566, note:"Accès libre + cours à deux pas du Vieux-Port. Nocturne le mardi. 2 rue du Chevalier Roze, 2e."},
  {n:"Les Dégourdies", c:"ceramique", a:3, lat:43.3124892, lng:5.3879643, note:"Belle de Mai. Stages émaux et cyanotype sur céramique. 3 rue Raymondino, 3e."},
  {n:"Vidéodrome 2", c:"cinema", a:6, lat:43.2939644, lng:5.3835288, note:"Ciné-club et bar au Cours Julien, très porté documentaire, séances à prix libre."},
  {n:"Les Variétés", c:"cinema", a:1, lat:43.2975076, lng:5.3797689, note:"L'art et essai de référence en centre-ville, belle programmation VO. Avec bar."},
  {n:"La Baleine", c:"cinema", a:6, lat:43.2936388, lng:5.3836713, note:"Ciné-bistrot au Cours Julien, à 50 m du Vidéodrome. Cuisine provençale au comptoir."},
  {n:"Le Gyptis", c:"cinema", a:3, lat:43.3125, lng:5.3844444, note:"Belle de Mai, géré par la Friche. Ciné-débats et conférences. 136 rue Loubon, 3e."},
  {n:"Le César", c:"cinema", a:6, lat:43.2862748, lng:5.3832277, note:"Art et essai historique à Castellane, VO sous-titrée."},
  {n:"Mucem", c:"culture", a:2, lat:43.2966941, lng:5.3610825, note:"Au-delà des expos, guette les cycles de débats et conférences. Toit-terrasse sur la rade."},
  {n:"Friche la Belle de Mai", c:"culture", a:3, lat:43.310172, lng:5.3905693, note:"Expos, résidences, concerts. L'écosystème art et tech de la ville. 41 rue Jobin, 3e."},
  {n:"Coco Velten", c:"culture", a:1, lat:43.3016586, lng:5.3767013, note:"Lieu hybride et solidaire, concerts et cantine à prix libre. Rue Bernard du Bois, 1er."},
  {n:"Cité Radieuse (Le Corbusier)", c:"culture", a:8, lat:43.2613455, lng:5.3964892, note:"L'Unité d'Habitation, toit-terrasse ouvert au public. Pèlerinage de design engineer. 280 bd Michelet, 8e."},
  {n:"[mac] Musée d'art contemporain", c:"culture", a:8, lat:43.2502578, lng:5.3897089, note:"Fraîchement rénové, collection permanente gratuite. 69 av. d'Haïfa, 8e."},
  {n:"Parc Borély", c:"culture", a:8, lat:43.260334, lng:5.3823007, note:"Le grand parc du sud, jardin botanique, parfait à vélo depuis la mer."},
  {n:"La Cité de l'Agriculture", c:"alim", a:1, lat:43.2995428, lng:5.3858187, note:"Agriculture urbaine et alimentation durable, avec cantine locale. Ton fil Capitulaire 2050. 6 sq. Stalingrad, 1er."},
  {n:"Les Paniers Marseillais", c:"alim", a:1, lat:43.3028712, lng:5.3867365, note:"LE réseau AMAP : une trentaine de groupes bio partout en ville. Point de départ pour trouver la tienne. 28 bd National, 1er."},
  {n:"Yachting Club Pointe Rouge", c:"mer", a:8, lat:43.2445742, lng:5.3679818, note:"Le gros club historique du port, école de voile et vue sur la rade."},
  {n:"ASPTT Marseille Voile", c:"mer", a:8, lat:43.2446718, lng:5.3687678, note:"Stages dériveur et windsurf très bien notés, esprit club convivial."},
  {n:"Société Nautique de Marseille", c:"mer", a:7, lat:43.2932276, lng:5.369931, note:"La Nautique : club historique sur ponton flottant, quai de Rive Neuve. École de voile et régates habitables."},
  {n:"CNTL", c:"mer", a:7, lat:43.2932592, lng:5.3641983, note:"Cercle Nautique et Touristique du Lacydon, quai Marcel Pagnol. Régates, école de sport, restaurant sur le port."},
  {n:"Union Nautique Marseillaise", c:"mer", a:7, lat:43.2933907, lng:5.3605993, note:"Club de quartier au pied du Pharo, bd Charles Livon. Ambiance associative."},
  {n:"Marina Olympique Roucas Blanc", c:"mer", a:7, lat:43.2662315, lng:5.367694, note:"La base nautique municipale héritée des JO 2024, sur la Corniche. Voile légère et pôle course."},
  {n:"1 2 3 Kayak", c:"mer", a:8, lat:43.2452902, lng:5.3728581, note:"Location à la plage de Montredon, départ idéal vers les Goudes."},
  {n:"Callelongue", c:"mer", a:8, lat:43.212848, lng:5.354413, note:"Le bout du monde : dernière calanque accessible en bus, départ des sentiers de Marseilleveyre."},
  {n:"Flow Studio (yoga)", c:"sport", a:1, lat:43.2927954, lng:5.3784761, note:"Vinyasa, kundalini, hatha, pilates. Rue Saint-Ferréol, 1er. Très bien noté."},
  {n:"Bloom Yoga Studio", c:"sport", a:6, lat:43.2878091, lng:5.3764317, note:"Studio cosy avec café, yoga et pilates. 81 rue Saint-Jacques, 6e."},
  {n:"Marseille Boxing Club", c:"sport", a:14, lat:43.3314773, lng:5.3827282, note:"Le club référence, du débutant au pro, avec sauna et espace détente. 14e."},
  {n:"Royal Boxing Club", c:"sport", a:8, lat:43.2767084, lng:5.3826481, note:"Encadrement exigeant, sparring dédié, bien équipé. Rue du Commandant Rolland, 8e."},
  {n:"Piscine Saint-Charles", c:"sport", a:1, lat:43.3061058, lng:5.3895789, note:"Piscine municipale du 1er, la plus proche du centre. Bonnet obligatoire."},
  {n:"Piscine Vallier", c:"sport", a:4, lat:43.3005931, lng:5.4012865, note:"Municipale du 4e, rénovée, une des mieux tenues de la ville. Env. 3 €."},
  {n:"Piscine Bonneveine", c:"sport", a:8, lat:43.2482527, lng:5.392773, note:"Municipale du 8e, vieillissante mais accueil sympa, pratique côté sud."},
  {n:"Piscine Pointe Rouge", c:"sport", a:8, lat:43.2417337, lng:5.3636549, note:"Municipale face au port de la Pointe Rouge, propre et bien surveillée."}
];

const OSRM = 'https://router.project-osrm.org/route/v1/cycling';

function arrLabel(a){
  return a === 1 ? '1er' : a + 'e';
}
function formatMins(mins){
  if(mins < 60) return mins + ' min';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m ? h + ' h ' + String(m).padStart(2, '0') : h + ' h';
}
function formatKm(km){
  return (Math.round(km * 10) / 10).toString().replace('.', ',') + ' km';
}
function popupHtml(p){
  const color = CATS[p.c].color;
  return `<div class="pop">
      <div class="cat"><span class="flag" style="background:${color}"></span>${CATS[p.c].label} · ${arrLabel(p.a)}</div>
      <div class="name">${p.n}</div>
      <div class="note">${p.note}</div>
    </div>`;
}

const map = L.map('map', {
  zoomControl:true,
  attributionControl:true,
  tapTolerance:25
});
map.attributionControl.setPrefix(false);
map.createPane('arronds');
map.getPane('arronds').style.zIndex = 350;
map.createPane('arrLabels');
map.getPane('arrLabels').style.zIndex = 450;
map.getPane('arrLabels').style.pointerEvents = 'none';

const PROVIDERS = [
  {url:'https://tile.openstreetmap.org/{z}/{x}/{y}.png', attr:'© OpenStreetMap'},
  {url:'https://maps.wikimedia.org/osm-intl/{z}/{x}/{y}.png', attr:'© OpenStreetMap · Wikimedia'},
  {url:'https://basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', attr:'© OpenStreetMap · CARTO'},
  {url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', attr:'© Esri'}
];
let tileTimer = null, tilesOk = false;

function tryProvider(i){
  if(i >= PROVIDERS.length){
    document.getElementById('basemap-note').style.display = 'block';
    return;
  }
  const p = PROVIDERS[i];
  const layer = L.tileLayer(p.url, {maxZoom:19, attribution:p.attr});
  let failed = false;
  layer.once('tileload', () => {
    tilesOk = true;
    clearTimeout(tileTimer);
    document.getElementById('basemap-note').style.display = 'none';
  });
  layer.on('tileerror', () => {
    if(tilesOk || failed) return;
    failed = true;
    clearTimeout(tileTimer);
    map.removeLayer(layer);
    tryProvider(i + 1);
  });
  tileTimer = setTimeout(() => {
    if(!tilesOk && !failed){
      failed = true;
      map.removeLayer(layer);
      tryProvider(i + 1);
    }
  }, 3000);
  layer.addTo(map);
}
tryProvider(0);

const activeCats = new Set(Object.keys(CATS));
const markers = [];
let arrondsLayer = null;
let arrLabels = [];

let routeMode = false;
let picks = [];
let pickMarkers = [];
let routeLine = null;
let routeReq = 0;

const bikeBtn = document.getElementById('bikeBtn');
const routeBar = document.getElementById('routeBar');
const routeMeta = document.getElementById('routeMeta');
const clearRouteBtn = document.getElementById('clearRouteBtn');

fetch('arrondissements.geojson')
  .then(r => {
    if(!r.ok) throw new Error('geo');
    return r.json();
  })
  .then(data => {
    arrondsLayer = L.geoJSON(data, {
      pane:'arronds',
      style: {
        color:'#14303F',
        weight:1.75,
        opacity:.5,
        fillColor:'#14303F',
        fillOpacity:.06
      },
      onEachFeature(feature, layer){
        const name = feature.properties.n;
        layer.bindTooltip(name + ' arr.', {
          sticky:true,
          direction:'center',
          className:'arr-tip',
          opacity:.95
        });
        layer.on('click', e => {
          if(!routeMode) return;
          L.DomEvent.stopPropagation(e);
          addPick({lat:e.latlng.lat, lng:e.latlng.lng, label:name + ' arr.'});
        });
        const c = layer.getBounds().getCenter();
        const tip = L.tooltip({
          permanent:true,
          direction:'center',
          className:'arr-label',
          pane:'arrLabels'
        })
          .setContent(name)
          .setLatLng(c);
        arrLabels.push(tip);
      }
    }).addTo(map);
    updateArrLabels();
  })
  .catch(() => {});

function updateArrLabels(){
  const show = map.getZoom() >= 11;
  document.getElementById('map').classList.toggle('hide-arr', !show);
  arrLabels.forEach(tip => {
    if(show){
      if(!tip._map) tip.addTo(map);
    } else if(tip._map){
      map.removeLayer(tip);
    }
  });
}

PLACES.forEach(p => {
  const color = CATS[p.c].color;
  const m = L.circleMarker([p.lat, p.lng], {
    radius:9, color:'#fff', weight:2, fillColor:color, fillOpacity:.95
  });
  m.bindPopup(popupHtml(p), {maxWidth:280, autoPanPadding:[48, 96]});
  m.bindTooltip(p.n, {permanent:true, direction:'right', offset:[9,0], className:'mk-label'});
  m._place = p;
  m.on('click', e => {
    if(!routeMode) return;
    L.DomEvent.stopPropagation(e);
    m.closePopup();
    addPick({lat:p.lat, lng:p.lng, label:p.n});
  });
  m.addTo(map);
  markers.push(m);
});

function updateLabels(){
  document.getElementById('map').classList.toggle('lowzoom', map.getZoom() < 13);
  updateArrLabels();
}
map.on('zoomend', updateLabels);

function isVisible(p){
  return activeCats.has(p.c);
}

function refresh(fit = true){
  markers.forEach(m => {
    const show = isVisible(m._place);
    if(show && !map.hasLayer(m)) m.addTo(map);
    if(!show && map.hasLayer(m)) map.removeLayer(m);
  });
  const visible = markers.filter(m => isVisible(m._place));
  if(fit && visible.length && !routeLine){
    map.fitBounds(L.featureGroup(visible).getBounds().pad(0.12));
  }
  document.querySelectorAll('.chip[data-cat]').forEach(ch => {
    ch.classList.toggle('off', !activeCats.has(ch.dataset.cat));
    ch.setAttribute('aria-pressed', activeCats.has(ch.dataset.cat));
  });
}

function toggleSet(set, key, allKeys){
  if(set.size === 1 && set.has(key)){
    allKeys.forEach(k => set.add(k));
  } else if(set.size === allKeys.length){
    set.clear(); set.add(key);
  } else {
    set.has(key) ? set.delete(key) : set.add(key);
    if(set.size === 0) allKeys.forEach(k => set.add(k));
  }
}

const chips = document.getElementById('chips');
const allChip = document.createElement('button');
allChip.className = 'chip all';
allChip.innerHTML = '<span class="full">Tout</span><span class="short">Tout</span>';
allChip.onclick = () => {
  Object.keys(CATS).forEach(k => activeCats.add(k));
  refresh();
};
chips.appendChild(allChip);

Object.entries(CATS).forEach(([key, cat]) => {
  const b = document.createElement('button');
  b.className = 'chip';
  b.dataset.cat = key;
  b.setAttribute('aria-pressed','true');
  b.innerHTML = `<span class="flag" style="--fc:${cat.color};background:${cat.color}"></span><span class="full">${cat.label}</span><span class="short">${cat.short}</span>`;
  b.onclick = () => {
    toggleSet(activeCats, key, Object.keys(CATS));
    refresh();
  };
  chips.appendChild(b);
});

function setRouteMeta(html){
  routeMeta.innerHTML = html;
}

function clearPicksVisual(){
  pickMarkers.forEach(m => map.removeLayer(m));
  pickMarkers = [];
  if(routeLine){
    map.removeLayer(routeLine);
    routeLine = null;
  }
}

function clearRoute(){
  picks = [];
  clearPicksVisual();
  if(routeMode){
    setRouteMeta('<strong>Tape 2 points</strong><div class="sub">Un lieu ou n’importe où sur la carte</div>');
  } else {
    setRouteMeta('');
  }
}

function drawPickMarkers(){
  pickMarkers.forEach(m => map.removeLayer(m));
  pickMarkers = picks.map((p, i) => {
    const m = L.circleMarker([p.lat, p.lng], {
      radius:11, color:'#fff', weight:3, fillColor:'#14303F', fillOpacity:1
    });
    m.bindTooltip(i === 0 ? 'A' : 'B', {
      permanent:true, direction:'top', offset:[0,-12], className:'pick-label'
    });
    m.addTo(map);
    return m;
  });
}

async function fetchBikeRoute(a, b){
  const url = `${OSRM}/${a.lng},${a.lat};${b.lng},${b.lat}?overview=full&geometries=geojson`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if(data.code !== 'Ok' || !data.routes?.length) throw new Error(data.code || 'no route');
  const r = data.routes[0];
  return {
    mins: Math.max(1, Math.round(r.duration / 60)),
    km: r.distance / 1000,
    coords: r.geometry.coordinates.map(([lng, lat]) => [lat, lng])
  };
}

async function maybeRoute(){
  if(picks.length < 2) return;
  const a = picks[0], b = picks[1];
  const req = ++routeReq;
  setRouteMeta(`<strong>${a.label} → ${b.label}</strong><div class="sub">Calcul du trajet vélo…</div>`);
  try{
    const route = await fetchBikeRoute(a, b);
    if(req !== routeReq) return;
    if(routeLine) map.removeLayer(routeLine);
    routeLine = L.polyline(route.coords, {
      color:'#0E7C86', weight:5, opacity:.92, lineJoin:'round', lineCap:'round'
    }).addTo(map);
    map.fitBounds(routeLine.getBounds().pad(0.18));
    setRouteMeta(
      `<strong>${formatMins(route.mins)} à vélo · ${formatKm(route.km)}</strong>` +
      `<div class="sub">${a.label} → ${b.label}</div>`
    );
  } catch(err){
    if(req !== routeReq) return;
    setRouteMeta(
      `<strong>Trajet introuvable</strong>` +
      `<div class="sub">${a.label} → ${b.label}</div>`
    );
  }
}

function addPick(point){
  if(!routeMode) return;
  if(picks.length >= 2){
    picks = [];
    clearPicksVisual();
  }
  picks.push(point);
  drawPickMarkers();
  if(picks.length === 1){
    setRouteMeta(`<strong>Départ : ${point.label}</strong><div class="sub">Tape l’arrivée</div>`);
  } else {
    maybeRoute();
  }
}

function setRouteMode(on){
  routeMode = on;
  bikeBtn.classList.toggle('on', on);
  bikeBtn.setAttribute('aria-pressed', String(on));
  bikeBtn.innerHTML = on
    ? '<span class="long">Quitter l’itinéraire</span><span class="short">Stop</span>'
    : '<span class="long">Itinéraire vélo</span><span class="short">Vélo</span>';
  routeBar.classList.toggle('show', on);
  map.getContainer().classList.toggle('picking', on);
  clearRoute();
  if(!on) routeBar.classList.remove('show');
}

bikeBtn.onclick = () => setRouteMode(!routeMode);
clearRouteBtn.onclick = () => clearRoute();

map.on('click', e => {
  if(!routeMode) return;
  const {lat, lng} = e.latlng;
  addPick({lat, lng, label: lat.toFixed(4) + ', ' + lng.toFixed(4)});
});

window.addEventListener('resize', () => map.invalidateSize());
refresh();
updateLabels();
</script>
</body>
