<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F6F4EE">
<title>Marseille — tes lieux</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --ink:#14303F;
    --paper:#F6F4EE;
    --line:#DCD7CB;
    --route:#0E7C86;
    --safe-t:env(safe-area-inset-top,0px);
    --safe-r:env(safe-area-inset-right,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
    --safe-l:env(safe-area-inset-left,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;touch-action:manipulation}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--paper);color:var(--ink);
    height:100dvh;overflow:hidden;position:relative;
  }
  #map{position:absolute;inset:0}
  .leaflet-container{background:#E6E2D6;font:inherit;height:100%}
  .leaflet-container.picking{cursor:crosshair}
  .leaflet-control-zoom{margin-top:calc(12px + var(--safe-t)) !important;margin-left:calc(10px + var(--safe-l)) !important}
  .leaflet-control-attribution{
    max-width:42vw;font-size:9px !important;line-height:1.2;
    margin:0 !important;padding:2px 5px !important;
    background:rgba(246,244,238,.85) !important;
  }
  .overlay{position:absolute;z-index:1000;pointer-events:none}
  .overlay > *{pointer-events:auto}

  .filters{
    top:calc(12px + var(--safe-t));
    right:calc(12px + var(--safe-r));
    left:auto;
    display:flex;flex-direction:column;align-items:flex-end;gap:8px;
    max-width:min(70vw,260px);
  }
  .bike-dock{
    bottom:calc(14px + var(--safe-b));
    right:calc(12px + var(--safe-r));
  }
  .bike-btn{
    min-height:44px;
    font-size:13px;font-weight:700;line-height:1;
    padding:12px 14px;border-radius:3px;
    border:1px solid var(--ink);background:var(--ink);color:#fff;
    cursor:pointer;user-select:none;white-space:nowrap;
    box-shadow:0 2px 12px rgba(20,48,63,.16);
  }
  .bike-btn:active{transform:scale(.97)}
  .bike-btn.on{background:rgba(246,244,238,.96);color:var(--ink)}
  .bike-btn:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .bike-btn .long{display:inline}.bike-btn .short{display:none}

  .chips{
    display:flex;flex-direction:column;align-items:stretch;gap:5px;
    overflow-y:auto;padding:8px;
    max-height:min(58dvh,480px);
    -webkit-overflow-scrolling:touch;scrollbar-width:thin;
    background:rgba(246,244,238,.94);border:1px solid var(--line);
    border-radius:3px;backdrop-filter:blur(6px);
    box-shadow:0 2px 14px rgba(20,48,63,.1);
  }
  .chip{
    display:inline-flex;align-items:center;gap:6px;
    min-height:36px;
    font-size:12.5px;font-weight:600;line-height:1.15;
    padding:8px 10px;border-radius:3px;
    border:1px solid var(--line);background:#fff;color:var(--ink);
    cursor:pointer;user-select:none;text-align:left;
  }
  .chip:active{transform:scale(.97)}
  .chip .flag{width:9px;height:9px;border-radius:2px;background:var(--fc,#888);flex:0 0 auto}
  .chip .full{display:inline}.chip .short{display:none}
  .chip.off{opacity:.38}
  .chip.all{border-color:var(--ink)}
  .chip:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

  .route-bar{
    bottom:calc(14px + var(--safe-b));
    left:calc(12px + var(--safe-l));
    right:auto;
    display:none;flex-direction:column;gap:8px;
    width:min(calc(100vw - 120px - var(--safe-l) - var(--safe-r)),320px);
    padding:11px 12px;border:1px solid var(--line);
    background:rgba(246,244,238,.96);border-radius:3px;
    font-size:13px;line-height:1.35;
    backdrop-filter:blur(6px);
    box-shadow:0 2px 14px rgba(20,48,63,.12);
  }
  .route-bar.show{display:flex}
  .route-bar .meta strong{font-weight:800}
  .route-bar .meta .sub{color:#3c4f5a;margin-top:2px;font-size:12px}
  .route-bar .actions{display:flex;gap:6px}
  .route-bar button{
    font:inherit;font-size:12px;font-weight:700;line-height:1;
    min-height:36px;padding:8px 12px;border-radius:3px;
    border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;
  }

  #basemap-note{
    position:absolute;left:50%;bottom:calc(18px + var(--safe-b));transform:translateX(-50%);
    z-index:1001;background:var(--ink);color:#fff;
    font-size:12px;line-height:1.4;padding:9px 13px;border-radius:4px;
    max-width:88%;text-align:center;display:none;pointer-events:none;
  }

  .leaflet-popup-content-wrapper{
    border-radius:4px;box-shadow:0 4px 18px rgba(20,48,63,.18);
  }
  .leaflet-popup-content{margin:12px 14px;line-height:1.4;max-width:min(72vw,260px)}
  .pop .cat{
    display:inline-flex;align-items:center;gap:5px;
    font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:#6b7a83;margin-bottom:4px;
  }
  .pop .cat .flag{width:8px;height:8px;border-radius:2px}
  .pop .name{font-size:14.5px;font-weight:800;margin-bottom:3px}
  .pop .note{font-size:12.5px;color:#3c4f5a}

  .mk-label{
    background:rgba(246,244,238,.94);border:1px solid rgba(20,48,63,.18);
    border-radius:3px;box-shadow:0 1px 4px rgba(20,48,63,.12);
    font-size:12px;font-weight:700;color:var(--ink);letter-spacing:.01em;
    padding:3px 7px;white-space:nowrap;line-height:1.2;
  }
  .mk-label::before{display:none}
  .mk-label.is-hidden{visibility:hidden !important}

  .pick-label{
    background:var(--ink);color:#fff;border:none;border-radius:3px;
    font-size:11px;font-weight:700;padding:3px 6px;box-shadow:none;
  }
  .pick-label::before{display:none}

  .arr-label{
    background:rgba(246,244,238,.78);border:1px solid rgba(20,48,63,.14);
    border-radius:999px;box-shadow:none;
    color:rgba(20,48,63,.72);font-size:11px;font-weight:800;letter-spacing:.06em;
    padding:2px 8px;white-space:nowrap;line-height:1.2;
  }
  .arr-label::before{display:none}
  .arr-label.is-hidden{visibility:hidden !important}

  @media (max-width:720px){
    .filters{
      top:calc(12px + var(--safe-t));
      left:calc(10px + var(--safe-l));
      right:calc(10px + var(--safe-r));
      max-width:none;
      align-items:stretch;
    }
    .bike-dock{
      bottom:calc(12px + var(--safe-b));
      right:calc(10px + var(--safe-r));
    }
    .bike-btn{min-height:44px;padding:12px 14px}
    .bike-btn .long{display:none}.bike-btn .short{display:inline}
    .chips{
      flex-direction:row;align-items:center;
      overflow-x:auto;overflow-y:hidden;
      max-height:none;width:100%;
      padding:6px;gap:6px;
      scrollbar-width:none;
    }
    .chips::-webkit-scrollbar{display:none}
    .chip{
      flex:0 0 auto;white-space:nowrap;
      min-height:38px;padding:8px 11px;
    }
    .chip .full{display:none}.chip .short{display:inline}
    .route-bar{
      left:calc(10px + var(--safe-l));
      width:calc(100vw - 108px - var(--safe-l) - var(--safe-r));
      bottom:calc(12px + var(--safe-b));
    }
    .leaflet-control-zoom{display:none}
    .leaflet-control-attribution{max-width:55vw}
  }

  @media (prefers-reduced-motion: reduce){
    .chip,.bike-btn{transition:none}
  }
</style>
</head>
<body>
<div id="map"></div>
<div class="overlay filters">
  <div class="chips" id="chips" role="group" aria-label="Filtrer par catégorie"></div>
</div>
<div class="overlay route-bar" id="routeBar" role="status">
  <div class="meta" id="routeMeta"></div>
  <div class="actions">
    <button type="button" id="clearRouteBtn">Effacer</button>
  </div>
</div>
<div class="overlay bike-dock">
  <button type="button" class="bike-btn" id="bikeBtn" aria-pressed="false">
    <span class="long">Itinéraire vélo</span><span class="short">Vélo</span>
  </button>
</div>
<div id="basemap-note">Fond de carte indisponible dans cet aperçu.<br>Télécharge le fichier et ouvre-le dans un navigateur pour l'afficher.</div>

  {n:"Piscine Saint-Charles", c:"sport", a:1, lat:43.3061058, lng:5.3895789, note:"Piscine municipale du 1er, la plus proche du centre. Bonnet obligatoire."},

  {n:"Piscine Bonneveine", c:"sport", a:8, lat:43.2482527, lng:5.392773, note:"Municipale du 8e, vieillissante mais accueil sympa, pratique côté sud."},
  {n:"Piscine Pointe Rouge", c:"sport", a:8, lat:43.2417337, lng:5.3636549, note:"Municipale face au port de la Pointe Rouge, propre et bien surveillée."}
];

const OSRM = 'https://router.project-osrm.org/route/v1/cycling';

function arrLabel(a){
  return a === 1 ? '1er' : a + 'e';
}
function formatMins(mins){
  if(mins < 60) return mins + ' min';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m ? h + ' h ' + String(m).padStart(2, '0') : h + ' h';
}
function formatKm(km){
  return (Math.round(km * 10) / 10).toString().replace('.', ',') + ' km';
}
function popupHtml(p){
  const color = CATS[p.c].color;
  return `<div class="pop">
      <div class="cat"><span class="flag" style="background:${color}"></span>${CATS[p.c].label} · ${arrLabel(p.a)}</div>
      <div class="name">${p.n}</div>
      <div class="note">${p.note}</div>
    </div>`;
}

const map = L.map('map', {
  zoomControl:true,
  attributionControl:true,
  tapTolerance:25
});
map.attributionControl.setPrefix(false);
map.createPane('arronds');
map.getPane('arronds').style.zIndex = 350;
map.getPane('arronds').style.pointerEvents = 'none';
map.createPane('arrLabels');
map.getPane('arrLabels').style.zIndex = 450;
map.getPane('arrLabels').style.pointerEvents = 'none';

const PROVIDERS = [
  {url:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', attr:'© OpenStreetMap · CARTO', opts:{subdomains:'abcd', maxZoom:20}},
  {url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', attr:'© OpenStreetMap · CARTO', opts:{subdomains:'abcd', maxZoom:20}},
  {url:'https://tile.openstreetmap.org/{z}/{x}/{y}.png', attr:'© OpenStreetMap', opts:{maxZoom:19}},
  {url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', attr:'© Esri', opts:{maxZoom:19}}
];
let tileTimer = null, tilesOk = false;

function tryProvider(i){
  if(i >= PROVIDERS.length){
    document.getElementById('basemap-note').style.display = 'block';
    return;
  }
  const p = PROVIDERS[i];
  const layer = L.tileLayer(p.url, Object.assign({attribution:p.attr}, p.opts || {}));
  let failed = false;
  layer.once('tileload', () => {
    tilesOk = true;
    clearTimeout(tileTimer);
    document.getElementById('basemap-note').style.display = 'none';
  });
  layer.on('tileerror', () => {
    if(tilesOk || failed) return;
    failed = true;
    clearTimeout(tileTimer);
    map.removeLayer(layer);
    tryProvider(i + 1);
  });
  tileTimer = setTimeout(() => {
    if(!tilesOk && !failed){
      failed = true;
      map.removeLayer(layer);
      tryProvider(i + 1);
    }
  }, 3000);
  layer.addTo(map);
}
tryProvider(0);

const activeCats = new Set(Object.keys(CATS));
const markers = [];
let arrondsLayer = null;
let arrLabels = [];

let routeMode = false;
let picks = [];
let pickMarkers = [];
let routeLine = null;
let routeReq = 0;

const bikeBtn = document.getElementById('bikeBtn');
const routeBar = document.getElementById('routeBar');
const routeMeta = document.getElementById('routeMeta');
const clearRouteBtn = document.getElementById('clearRouteBtn');

fetch('arrondissements.geojson')
  .then(r => {
    if(!r.ok) throw new Error('geo');
    return r.json();
  })
  .then(data => {
    arrondsLayer = L.geoJSON(data, {
      pane:'arronds',
      interactive:false,
      style: {
        color:'#14303F',
        weight:1.2,
        opacity:.28,
        fillColor:'#14303F',
        fillOpacity:.03
      },
      onEachFeature(feature, layer){
        const name = feature.properties.n;
        const c = layer.getBounds().getCenter();
        const tip = L.tooltip({
          permanent:true,
          direction:'center',
          className:'arr-label',
          pane:'arrLabels'
        })
          .setContent(name)
          .setLatLng(c);
        arrLabels.push(tip);
      }
    }).addTo(map);
    updateLabels();
  })
  .catch(() => {});

function labelBox(pt, text, padX, padY){
  const w = Math.min(190, 14 + text.length * 7.2);
  const h = 20;
  return {
    x: pt.x + padX,
    y: pt.y + padY - h / 2,
    w, h
  };
}

function overlaps(a, b, gap){
  return a.x < b.x + b.w + gap &&
    a.x + a.w + gap > b.x &&
    a.y < b.y + b.h + gap &&
    a.y + a.h + gap > b.y;
}

function declutterTips(items, gap){
  const placed = [];
  items.forEach(item => {
    const el = item.tip && item.tip.getElement && item.tip.getElement();
    if(!el) return;
    const hit = placed.some(p => overlaps(item.box, p, gap));
    el.classList.toggle('is-hidden', hit);
    if(!hit) placed.push(item.box);
  });
  return placed;
}

function updateLabels(){
  const z = map.getZoom();
  const showPlaces = z >= 14;
  const showArr = z >= 11 && z < 15;

  arrLabels.forEach(tip => {
    if(showArr){
      if(!tip._map) tip.addTo(map);
    } else if(tip._map){
      map.removeLayer(tip);
    }
  });

  // Place labels: permanent + declutter only when zoomed in
  markers.forEach(m => {
    const tip = m.getTooltip();
    if(!tip) return;
    if(showPlaces && map.hasLayer(m)){
      if(!tip.options.permanent){
        m.unbindTooltip();
        m.bindTooltip(m._place.n, {permanent:true, direction:'right', offset:[10,0], className:'mk-label'});
      }
    } else {
      // hover-only at lower zoom to avoid soup
      if(tip.options.permanent){
        m.unbindTooltip();
        m.bindTooltip(m._place.n, {permanent:false, direction:'top', offset:[0,-8], className:'mk-label'});
      }
    }
  });

  requestAnimationFrame(() => {
    const kept = [];
    if(showArr){
      const arrItems = arrLabels
        .filter(tip => tip._map)
        .map(tip => {
          const pt = map.latLngToContainerPoint(tip.getLatLng());
          return {tip, box: labelBox(pt, tip.getContent(), -20, 0)};
        })
        .sort((a, b) => a.box.y - b.box.y || a.box.x - b.box.x);
      declutterTips(arrItems, 6).forEach(b => kept.push(b));
    }
    if(showPlaces){
      const placeItems = markers
        .filter(m => map.hasLayer(m) && m.getTooltip() && m.getTooltip().options.permanent)
        .map(m => {
          const tip = m.getTooltip();
          const pt = map.latLngToContainerPoint(m.getLatLng());
          return {tip, box: labelBox(pt, m._place.n, 10, 0)};
        })
        .sort((a, b) => a.box.y - b.box.y || a.box.x - b.box.x);
      // avoid covering arr labels already kept
      placeItems.forEach(item => {
        const el = item.tip.getElement();
        if(!el) return;
        const hit = kept.some(p => overlaps(item.box, p, 8));
        el.classList.toggle('is-hidden', hit);
        if(!hit) kept.push(item.box);
      });
    }
  });
}

PLACES.forEach(p => {
  const color = CATS[p.c].color;
  const m = L.circleMarker([p.lat, p.lng], {
    radius:8, color:'#fff', weight:2, fillColor:color, fillOpacity:.95
  });
  m.bindPopup(popupHtml(p), {maxWidth:280, autoPanPadding:[48, 96]});
  m.bindTooltip(p.n, {permanent:false, direction:'top', offset:[0,-8], className:'mk-label'});
  m._place = p;
  m.on('click', e => {
    if(!routeMode) return;
    L.DomEvent.stopPropagation(e);
    m.closePopup();
    addPick({lat:p.lat, lng:p.lng, label:p.n});
  });
  m.addTo(map);
  markers.push(m);
});

map.on('zoomend moveend', updateLabels);

function isVisible(p){
  return activeCats.has(p.c);
}

function refresh(fit = false){
  markers.forEach(m => {
    const show = isVisible(m._place);
    if(show && !map.hasLayer(m)) m.addTo(map);
    if(!show && map.hasLayer(m)) map.removeLayer(m);
  });
  const visible = markers.filter(m => isVisible(m._place));
  if(fit && visible.length){
    map.fitBounds(L.featureGroup(visible).getBounds().pad(0.12));
  }
  document.querySelectorAll('.chip[data-cat]').forEach(ch => {
    ch.classList.toggle('off', !activeCats.has(ch.dataset.cat));
    ch.setAttribute('aria-pressed', activeCats.has(ch.dataset.cat));
  });
  updateLabels();
}

function toggleSet(set, key, allKeys){
  if(set.size === 1 && set.has(key)){
    allKeys.forEach(k => set.add(k));
  } else if(set.size === allKeys.length){
    set.clear(); set.add(key);
  } else {
    set.has(key) ? set.delete(key) : set.add(key);
    if(set.size === 0) allKeys.forEach(k => set.add(k));
  }
}

const chips = document.getElementById('chips');
const allChip = document.createElement('button');
allChip.className = 'chip all';
allChip.innerHTML = '<span class="full">Tout</span><span class="short">Tout</span>';
allChip.onclick = () => {
  Object.keys(CATS).forEach(k => activeCats.add(k));
  refresh();
};
chips.appendChild(allChip);

Object.entries(CATS).forEach(([key, cat]) => {
  const b = document.createElement('button');
  b.className = 'chip';
  b.dataset.cat = key;
  b.setAttribute('aria-pressed','true');
  b.innerHTML = `<span class="flag" style="--fc:${cat.color};background:${cat.color}"></span><span class="full">${cat.label}</span><span class="short">${cat.short}</span>`;
  b.onclick = () => {
    toggleSet(activeCats, key, Object.keys(CATS));
    refresh();
  };
  chips.appendChild(b);
});

function setRouteMeta(html){
  routeMeta.innerHTML = html;
}

function clearPicksVisual(){
  pickMarkers.forEach(m => map.removeLayer(m));
  pickMarkers = [];
  if(routeLine){
    map.removeLayer(routeLine);
    routeLine = null;
  }
}

function clearRoute(){
  picks = [];
  clearPicksVisual();
  if(routeMode){
    setRouteMeta('<strong>Tape 2 points</strong><div class="sub">Un lieu ou n’importe où sur la carte</div>');
  } else {
    setRouteMeta('');
  }
}

function drawPickMarkers(){
  pickMarkers.forEach(m => map.removeLayer(m));
  pickMarkers = picks.map((p, i) => {
    const m = L.circleMarker([p.lat, p.lng], {
      radius:11, color:'#fff', weight:3, fillColor:'#14303F', fillOpacity:1
    });
    m.bindTooltip(i === 0 ? 'A' : 'B', {
      permanent:true, direction:'top', offset:[0,-12], className:'pick-label'
    });
    m.addTo(map);
    return m;
  });
}

async function fetchBikeRoute(a, b){
  const url = `${OSRM}/${a.lng},${a.lat};${b.lng},${b.lat}?overview=full&geometries=geojson`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if(data.code !== 'Ok' || !data.routes?.length) throw new Error(data.code || 'no route');
  const r = data.routes[0];
  return {
    mins: Math.max(1, Math.round(r.duration / 60)),
    km: r.distance / 1000,
    coords: r.geometry.coordinates.map(([lng, lat]) => [lat, lng])
  };
}

async function maybeRoute(){
  if(picks.length < 2) return;
  const a = picks[0], b = picks[1];
  const req = ++routeReq;
  setRouteMeta(`<strong>${a.label} → ${b.label}</strong><div class="sub">Calcul du trajet vélo…</div>`);
  try{
    const route = await fetchBikeRoute(a, b);
    if(req !== routeReq) return;
    if(routeLine) map.removeLayer(routeLine);
    routeLine = L.polyline(route.coords, {
      color:'#0E7C86', weight:5, opacity:.92, lineJoin:'round', lineCap:'round'
    }).addTo(map);
    setRouteMeta(
      `<strong>${formatMins(route.mins)} à vélo · ${formatKm(route.km)}</strong>` +
      `<div class="sub">${a.label} → ${b.label}</div>`
    );
  } catch(err){
    if(req !== routeReq) return;
    setRouteMeta(
      `<strong>Trajet introuvable</strong>` +
      `<div class="sub">${a.label} → ${b.label}</div>`
    );
  }
}

function addPick(point){
  if(!routeMode) return;
  if(picks.length >= 2){
    picks = [];
    clearPicksVisual();
  }
  picks.push(point);
  drawPickMarkers();
  if(picks.length === 1){
    setRouteMeta(`<strong>Départ : ${point.label}</strong><div class="sub">Tape l’arrivée</div>`);
  } else {
    maybeRoute();
  }
}

function setRouteMode(on){
  routeMode = on;
  bikeBtn.classList.toggle('on', on);
  bikeBtn.setAttribute('aria-pressed', String(on));
  bikeBtn.innerHTML = on
    ? '<span class="long">Quitter l’itinéraire</span><span class="short">Stop</span>'
    : '<span class="long">Itinéraire vélo</span><span class="short">Vélo</span>';
  routeBar.classList.toggle('show', on);
  map.getContainer().classList.toggle('picking', on);
  clearRoute();
  if(!on) routeBar.classList.remove('show');
}

bikeBtn.onclick = () => setRouteMode(!routeMode);
clearRouteBtn.onclick = () => clearRoute();

map.on('click', e => {
  if(!routeMode) return;
  const {lat, lng} = e.latlng;
  addPick({lat, lng, label: lat.toFixed(4) + ', ' + lng.toFixed(4)});
});

window.addEventListener('resize', () => map.invalidateSize());
refresh(true);
updateLabels();
</script>
